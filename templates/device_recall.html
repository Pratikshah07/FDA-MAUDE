<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Recall Search | MAUDE Data Processor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --primary-light: #3b82f6;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --bg-gradient-start: #667eea;
            --bg-gradient-end: #764ba2;
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --border: #e5e7eb;
            --shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.15);
            --input-bg: #ffffff;
            --container-bg: #ffffff;
            --container-shadow: 0 2px 10px rgba(0, 0, 0, 0.05);
            --btn-disabled-bg: #9ca3af;
            --status-error-bg: #fee2e2;
            --status-error-text: #991b1b;
            --status-error-border: #fca5a5;
            --status-success-bg: #d1fae5;
            --status-success-text: #065f46;
            --status-success-border: #6ee7b7;
            --status-info-bg: #dbeafe;
            --status-info-text: #1e40af;
            --status-info-border: #93c5fd;
            --table-header-bg: #f8fafc;
            --table-hover-bg: #f8fafc;
        }

        [data-theme="dark"] {
            --bg-gradient-start: #1a1a2e;
            --bg-gradient-end: #16213e;
            --card-bg: rgba(30, 30, 50, 0.95);
            --text-primary: #e2e8f0;
            --text-secondary: #a0aec0;
            --border: #2d3748;
            --shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.4);
            --input-bg: #2d2d44;
            --container-bg: #1e1e36;
            --container-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
            --btn-disabled-bg: #4a5568;
            --status-error-bg: #3b1a1a;
            --status-error-text: #fca5a5;
            --status-error-border: #742a2a;
            --status-success-bg: #1a3b2a;
            --status-success-text: #6ee7b7;
            --status-success-border: #276749;
            --status-info-bg: #1a2a4a;
            --status-info-text: #93c5fd;
            --status-info-border: #2b4a8a;
            --table-header-bg: #1e1e36;
            --table-hover-bg: #252540;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .nav-menu { display: flex; gap: 10px; }

        .nav-btn {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 50px;
            color: white;
        }

        .theme-toggle {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .header p {
            font-size: 1rem;
            opacity: 0.85;
        }

        .main-card {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            padding: 40px;
            backdrop-filter: blur(10px);
        }

        .section-divider {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin: 28px 0 18px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        .section-divider:first-child { margin-top: 0; }

        .inputs-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }

        .form-group { display: flex; flex-direction: column; gap: 6px; }

        .form-group label {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .form-group input {
            background: var(--input-bg);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 0.95rem;
            color: var(--text-primary);
            transition: border-color 0.2s;
            outline: none;
            width: 100%;
        }

        .form-group input:focus {
            border-color: var(--primary);
        }

        .fetch-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 4px;
        }

        .fetch-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.4);
        }

        .fetch-btn:disabled {
            background: var(--btn-disabled-bg);
            cursor: not-allowed;
            transform: none;
        }

        .status {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 500;
            display: none;
        }

        .status.info {
            display: block;
            background: var(--status-info-bg);
            color: var(--status-info-text);
            border: 1px solid var(--status-info-border);
        }

        .status.success {
            display: block;
            background: var(--status-success-bg);
            color: var(--status-success-text);
            border: 1px solid var(--status-success-border);
        }

        .status.error {
            display: block;
            background: var(--status-error-bg);
            color: var(--status-error-text);
            border: 1px solid var(--status-error-border);
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .inputs-grid { grid-template-columns: 1fr; }
            .header h1 { font-size: 1.6rem; }
            .main-card { padding: 24px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <div class="nav-menu">
                <a href="/" class="nav-btn">
                    <i class="fas fa-home"></i>
                    <span>Home</span>
                </a>
                <a href="/imdrf-insights" class="nav-btn">
                    <i class="fas fa-chart-line"></i>
                    <span>IMDRF Insights</span>
                </a>
                <a href="/txt-to-csv" class="nav-btn">
                    <i class="fas fa-exchange-alt"></i>
                    <span>TXT to CSV</span>
                </a>
            </div>
            <div class="user-menu">
                <span>{{ user.email }}</span>
                <button class="theme-toggle" id="themeToggle" title="Toggle dark/light mode">
                    <i class="fas fa-moon" id="themeIcon"></i>
                </button>
                <a href="#" class="logout-btn" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>
            </div>
        </div>

        <div class="header">
            <h1>
                <i class="fas fa-triangle-exclamation"></i>
                Device Recall Search
            </h1>
            <p>Search FDA device recalls via openFDA API (Method 1 — /device/recall.json)</p>
        </div>

        <div class="main-card">
            <div class="section-divider">
                <i class="fas fa-sliders"></i> Search Parameters
            </div>

            <div class="inputs-grid">
                <div class="form-group">
                    <label for="productCode">
                        <i class="fas fa-barcode"></i> Product Code
                    </label>
                    <input
                        type="text"
                        id="productCode"
                        placeholder="e.g. DQY, FOZ, MRY"
                        maxlength="10"
                        autocomplete="off"
                    >
                </div>
                <div class="form-group">
                    <label for="dateFrom">
                        <i class="fas fa-calendar-days"></i> Date From
                    </label>
                    <input
                        type="date"
                        id="dateFrom"
                    >
                </div>
                <div class="form-group">
                    <label for="dateTo">
                        <i class="fas fa-calendar-check"></i> Date To
                    </label>
                    <input
                        type="date"
                        id="dateTo"
                    >
                </div>
            </div>

            <button class="fetch-btn" id="fetchBtn">
                <i class="fas fa-magnifying-glass"></i> Fetch Recall Data
            </button>

            <div class="status" id="statusMsg"></div>
        </div>
    </div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script id="firebase-config-data" type="application/json">{{ firebase_config | tojson }}</script>
<script>
    firebase.initializeApp(JSON.parse(document.getElementById('firebase-config-data').textContent));
    document.getElementById('logoutBtn').addEventListener('click', function(e) {
        e.preventDefault();
        firebase.auth().signOut().finally(function() {
            window.location.href = '/logout';
        });
    });
</script>
<script>
    (function() {
        const saved = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', saved);
        const icon = document.getElementById('themeIcon');
        if (icon) icon.className = saved === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
        document.getElementById('themeToggle').addEventListener('click', function() {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            document.getElementById('themeIcon').className = next === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
        });
    })();
</script>
<script>
    const fetchBtn = document.getElementById('fetchBtn');
    const statusMsg = document.getElementById('statusMsg');

    function showStatus(msg, type) {
        statusMsg.textContent = msg;
        statusMsg.className = 'status ' + type;
    }

    fetchBtn.addEventListener('click', function() {
        const productCode = document.getElementById('productCode').value.trim();
        const dateFrom    = document.getElementById('dateFrom').value;
        const dateTo      = document.getElementById('dateTo').value;

        if (!productCode) {
            showStatus('Please enter a product code.', 'error');
            return;
        }
        if (!dateFrom || !dateTo) {
            showStatus('Please select both a start and end date.', 'error');
            return;
        }
        if (dateFrom > dateTo) {
            showStatus('Date From must be before Date To.', 'error');
            return;
        }

        showStatus('Fetching recall data…', 'info');
        fetchBtn.disabled = true;
        fetchBtn.innerHTML = '<span class="spinner"></span> Fetching…';

        // Placeholder — API integration to be added
        setTimeout(function() {
            fetchBtn.disabled = false;
            fetchBtn.innerHTML = '<i class="fas fa-magnifying-glass"></i> Fetch Recall Data';
            showStatus('API integration coming soon. Inputs received: product_code=' + productCode + ', from=' + dateFrom + ', to=' + dateTo, 'info');
        }, 1000);
    });
</script>
</body>
</html>
